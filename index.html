<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZAN OS | OVERSEER v6.5</title>
    <style>
        :root {
            --bg: #0b0e14;
            --text: #e6edf3;
            --primary: #2f81f7;
            --admin-color: #00ff41;
            --danger: #ff0000;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* GLITCH & BREACH */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); filter: contrast(200%); }
            40% { transform: translate(-4px, -4px); filter: hue-rotate(90deg); }
            60% { transform: translate(4px, 4px); }
            80% { transform: translate(4px, -4px); filter: invert(20%); }
            100% { transform: translate(0); }
        }
        .glitch-active { animation: glitch 0.15s infinite; }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; display: none; }
        .admin-mode #matrix-canvas { display: block; }

        /* LOGIN INTERFACE */
        #edez-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            flex-direction: column; backdrop-filter: blur(5px);
        }
        .login-box {
            border: 2px solid var(--admin-color); padding: 50px;
            background: rgba(0,255,65,0.02); text-align: center; width: 350px;
            box-shadow: 0 0 50px rgba(0,255,65,0.3); position: relative;
        }
        .login-box h2 { color: var(--admin-color); letter-spacing: 8px; font-size: 14px; }
        .login-input {
            background: transparent; border: 1px solid var(--admin-color);
            color: var(--admin-color); width: 90%; padding: 12px;
            text-align: center; margin: 20px 0; outline: none; font-size: 18px;
        }

        /* OSINT SYSTEM */
        .id-card {
            border: 1px solid var(--admin-color); background: rgba(0, 255, 65, 0.05);
            padding: 15px; display: flex; gap: 15px; margin-bottom: 5px;
        }
        .id-avatar { font-size: 40px; background: #000; border: 1px solid var(--admin-color); padding: 5px; }
        .fake-map {
            width: 100%; height: 180px; border: 1px solid var(--admin-color);
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg');
            background-size: cover; opacity: 0.3; position: relative; margin: 10px 0; filter: grayscale(1) invert(1);
        }
        .map-ping { position: absolute; width: 15px; height: 15px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; box-shadow: 0 0 10px red; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .osint-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 4px; border: 1px solid var(--admin-color); padding: 10px;
            background: rgba(0,0,0,0.8); max-height: 400px; overflow-y: auto;
        }
        .osint-grid a {
            color: var(--admin-color); text-decoration: none; font-size: 8px;
            border: 1px solid rgba(0,255,0,0.2); padding: 3px; text-align: center;
            text-transform: uppercase;
        }
        .osint-grid a:hover { background: var(--admin-color); color: #000; box-shadow: 0 0 8px var(--admin-color); }
        .cat-title { font-size: 9px; color: #555; margin-top: 10px; border-left: 2px solid var(--admin-color); padding-left: 5px; }

        /* UI ELEMENTS */
        .header { padding: 15px 30px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: rgba(11,14,20,0.95); }
        .root-btn { background: transparent; border: 1px solid var(--admin-color); color: var(--admin-color); padding: 5px 20px; cursor: pointer; font-size: 10px; letter-spacing: 1px; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px 10% 120px 10%; display: flex; flex-direction: column; gap: 15px; }
        .admin-mode #chat-container { margin-right: 320px; }

        .message { max-width: 85%; font-size: 13px; padding: 10px; border-radius: 5px; animation: fadeIn 0.2s ease; line-height: 1.5; }
        .user { align-self: flex-end; border-right: 2px solid var(--primary); color: #888; }
        .ai { align-self: flex-start; border-left: 2px solid #333; background: rgba(255,255,255,0.02); }
        .admin-mode .ai { border-left-color: var(--admin-color); color: var(--admin-color); }

        /* SIDEBAR */
        #admin-sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: rgba(0,0,0,0.98); border-left: 2px solid var(--admin-color); transition: 0.5s; padding: 20px; z-index: 50; }
        .admin-mode #admin-sidebar { right: 0; }
        .log-box { height: 85%; overflow-y: auto; color: var(--admin-color); font-size: 9px; margin-top: 10px; scroll-behavior: smooth; }

        /* INPUT */
        .input-wrapper { position: fixed; bottom: 0; width: 100%; padding: 20px 0; background: linear-gradient(transparent, var(--bg) 95%); display: flex; justify-content: center; }
        .input-container { width: 85%; max-width: 900px; background: #161b22; border: 1px solid #333; border-radius: 8px; display: flex; padding: 5px 15px; }
        .admin-mode .input-container { border-color: var(--admin-color); }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; font-family: monospace; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="main-body">

    <div id="edez-login">
        <div class="login-box">
            <h2>ROOT AUTH</h2>
            <div id="login-status" style="font-size: 10px; color: #444;">WAITING FOR HANDSHAKE...</div>
            <input type="password" id="pass-field" class="login-input" placeholder="PASSKEY">
            <div style="font-size: 8px; opacity: 0.3;">OVERSEER_V6.5 / BYPASS_ACTIVE</div>
        </div>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div id="admin-sidebar">
        <div style="color:var(--admin-color); font-size: 12px;"><b>LIVE_PACKET_SNIFFER</b></div>
        <div id="log-box" class="log-box"></div>
    </div>

    <div class="header">
        <div><span style="color:var(--admin-color)">●</span> <b id="title">OVERSEER NET</b></div>
        <button id="login-trigger" class="root-btn" onclick="triggerGlitchLogin()">ROOT LOGIN</button>
    </div>

    <div id="chat-container">
        <div class="message ai">Terminal hazır. Hedef belirlemek için find:[isim] yazın.</div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="root@overseer:~$ " autocomplete="off">
            <button onclick="send()" style="background:none; border:none; color:var(--admin-color); cursor:pointer;">[EXE]</button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "BURAYA_GEMINI_KEY"; 
        let isAdmin = false;

        function triggerGlitchLogin() {
            document.body.classList.add("glitch-active");
            setTimeout(() => {
                document.body.classList.remove("glitch-active");
                document.getElementById("edez-login").style.display = "flex";
                document.getElementById("pass-field").focus();
            }, 500);
        }

        document.getElementById("pass-field").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const s = document.getElementById("login-status");
                s.innerText = "BRUTEFORCING..."; s.style.color = "yellow";
                setTimeout(() => {
                    s.innerText = "GRANTED"; s.style.color = "#0f0";
                    setTimeout(() => {
                        document.getElementById("edez-login").style.display = "none";
                        activateAdmin();
                    }, 600);
                }, 1000);
            }
        });

        // 70+ Platform Listesi
        const getMasterList = (t) => {
            const cats = {
                social: ["Instagram", "Twitter", "TikTok", "Reddit", "Snapchat", "Tumblr", "Pinterest", "LinkedIn", "Facebook", "Quora", "Medium", "Wattpad", "Flickr"],
                gaming: ["Steam", "Minecraft", "Roblox", "Twitch", "Discord", "Xbox", "Playstation", "Chess", "EpicGames", "BattleNet", "Origin", "GOG", "Uplay", "Namemc"],
                devs: ["GitHub", "GitLab", "BitBucket", "StackOverflow", "CodePen", "Replit", "Behance", "Dribbble", "DeviantArt", "Kaggle", "SourceForge"],
                leaks: ["Pastebin", "TryHackMe", "HackTheBox", "Shodan", "ExploitDB", "Keybase", "Archive", "CyberGhost", "TorNode", "DeepScan"],
                media: ["Spotify", "SoundCloud", "YouTube", "Vimeo", "Letterboxd", "Last.fm", "Mixcloud", "DailyMotion", "Deezer", "Tidal"]
            };
            
            let h = "";
            for (let cat in cats) {
                h += `<div class="cat-title">${cat.toUpperCase()} NETWORK</div><div class="osint-grid">`;
                cats[cat].forEach(s => h += `<a href="https://www.google.com/search?q=${t}+${s}" target="_blank">${s}</a>`);
                h += `</div>`;
            }
            return h;
        };

        async function send() {
            const input = document.getElementById("userInput");
            const val = input.value.trim();
            if (!val) return;

            if (val === "Po") { triggerGlitchLogin(); input.value = ""; return; }

            if (isAdmin && val.startsWith("find:")) {
                const target = val.replace("find:", "").trim();
                input.value = "";
                addMsg("user", `SCAN_COMMAND: ${target}`);
                
                let h = `<div class="id-card">
                    <div class="id-avatar">☣</div>
                    <div class="id-info"><b>TARGET:</b> ${target}<br><b>VECTOR:</b> OSINT_DEEP<br><b>VULN:</b> DETECTED</div>
                </div>
                <div class="fake-map"><div class="map-ping" style="top:${Math.random()*60+20}%; left:${Math.random()*60+20}%"></div></div>`;
                h += getMasterList(target);
                h += `<button class="root-btn" style="width:100%; margin-top:10px;" onclick="startDl('${target}')">DOWNLOAD PRIVATE ARCHIVE</button>
                <div id="dl-ui" style="display:none; border:1px solid #0f0; margin-top:5px; padding:5px;">
                    <div style="font-size:8px; margin-bottom:3px;">LEAKING_DATA...</div>
                    <div style="width:100%; background:#111; height:10px;"><div id="p-bar" style="width:0%; height:100%; background:#0f0;"></div></div>
                </div>`;
                
                setTimeout(() => addMsg("ai", h), 700);
                return;
            }

            addMsg("user", val); input.value = "";
            try {
                const prompt = isAdmin ? `[ROOT] Hacker gibi çok kısa teknik konuş: ${val}` : val;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await resp.json();
                addMsg("ai", isAdmin ? `> ${d.candidates[0].content.parts[0].text}` : d.candidates[0].content.parts[0].text);
            } catch (e) { addMsg("ai", "OFFLINE."); }
        }

        function startDl(t) {
            document.getElementById("dl-ui").style.display = "block";
            let p = 0;
            const i = setInterval(() => {
                p += 4; if(p > 100) p = 100;
                document.getElementById("p-bar").style.width = p + "%";
                if(p === 100) { clearInterval(i); addMsg("ai", `> [SUCCESS]: @${t} database dump complete.`); }
            }, 100);
        }

        function addMsg(type, text) {
            const box = document.getElementById("chat-container");
            const div = document.createElement("div"); div.className = `message ${type}`; div.innerHTML = text;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function activateAdmin() {
            isAdmin = true;
            document.body.classList.add("admin-mode");
            document.getElementById("title").innerText = "OVERSEER [ROOT]";
            document.getElementById("login-trigger").style.display = "none";
            startMatrix();
            setInterval(() => {
                const b = document.getElementById("log-box");
                const d = document.createElement("div");
                d.style = "margin-bottom:4px; border-bottom:1px solid #002200;";
                d.innerText = `[${new Date().toLocaleTimeString()}] IN: ${Math.random().toString(16).slice(2,8).toUpperCase()} -> CAPTURED`;
                b.prepend(d);
            }, 1200);
        }

        function startMatrix() {
            const canvas = document.getElementById('matrix-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const drops = Array(Math.floor(canvas.width/16)).fill(1);
            setInterval(() => {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#0F0"; ctx.font = "14px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i*16, y*16);
                    if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
                });
            }, 30);
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    </script>
</body>
</html>
