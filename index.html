<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZAN AI | ADMIN OS</title>
    <style>
        :root {
            --bg: #0b0e14;
            --text: #e6edf3;
            --primary: #2f81f7;
            --admin-color: #00ff41; /* Klasik Hacker Yeşili */
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ADMIN MODU EFEKTLERİ --- */
        body.admin-mode {
            background-color: #000;
            font-family: 'Courier New', monospace;
            --primary: var(--admin-color);
        }

        .header {
            padding: 15px 30px;
            border-bottom: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
        }

        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #238636; display: inline-block; margin-right: 5px;
            box-shadow: 0 0 10px #238636;
        }

        #chat-container {
            flex: 1; overflow-y: auto;
            padding: 40px 15% 100px 15%;
            display: flex; flex-direction: column; gap: 25px;
        }

        .message { max-width: 85%; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; color: #8b949e; border-right: 2px solid var(--primary); padding-right: 15px; }
        .ai { align-self: flex-start; border-left: 2px solid #30363d; padding-left: 15px; }

        .admin-mode .ai { border-left-color: var(--admin-color); color: var(--admin-color); text-shadow: 0 0 5px var(--admin-color); }
        .admin-mode .user { color: #fff; border-right-color: var(--admin-color); }

        .input-wrapper {
            position: fixed; bottom: 0; width: 100%;
            padding: 30px 0; background: linear-gradient(transparent, var(--bg) 50%);
            display: flex; justify-content: center;
        }

        .input-container {
            width: 70%; max-width: 800px;
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; display: flex; padding: 10px 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .admin-mode .input-container { border-color: var(--admin-color); box-shadow: 0 0 20px rgba(0,255,65,0.2); }

        input {
            flex: 1; background: transparent; border: none; color: white;
            font-size: 16px; outline: none; padding: 10px;
        }

        button {
            background: var(--primary); color: white; border: none;
            padding: 0 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .scanline { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                     background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                                 linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
                     background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100; }
        .admin-mode .scanline { display: block; }

        /* Arama Sonuç Tablosu Stili */
        .search-results {
            border: 1px solid var(--admin-color);
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 255, 65, 0.05);
            margin-top: 10px;
            font-family: monospace;
        }
        .search-results a {
            color: var(--primary);
            text-decoration: none;
        }
        .search-results a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body id="main-body">

    <div class="scanline"></div>

    <div class="header">
        <div style="font-weight: bold; letter-spacing: 1px;">
            <span class="status-dot"></span> <span id="model-name">SAZAN-AI v1.5</span>
        </div>
        <div id="mode-text" style="font-size: 12px; color: #8b949e;">NORMAL_ACCESS</div>
    </div>

    <div id="chat-container">
        <div class="message ai">
            Sisteme hoş geldin. Sana nasıl yardımcı olabilirim?
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Bir mesaj yazın veya komut girin..." autocomplete="off">
            <button onclick="send()">GÖNDER</button>
        </div>
    </div>

    <script>
        // API KEY - Burayı kendi Gemini API Key'inle değiştirdiğinden emin ol
        const API_KEY = "BURAYA_API_KEYINI_YAZ"; 
        let isAdmin = false;

        async function searchName(targetName) {
            const box = document.getElementById("chat-container");
            
            const platforms = [
    
    { name: "Instagram", url: `https://www.instagram.com/${targetName}/` },
    { name: "X (Twitter)", url: `https://twitter.com/${targetName}` },
    { name: "TikTok", url: `https://www.tiktok.com/@${targetName}` },
    { name: "Reddit", url: `https://www.reddit.com/user/${targetName}` },
    { name: "Pinterest", url: `https://www.pinterest.com/${targetName}/` },
    { name: "Facebook", url: `https://www.facebook.com/${targetName}` },
    { name: "Tumblr", url: `https://${targetName}.tumblr.com` },

    
    { name: "GitHub", url: `https://github.com/${targetName}` },
    { name: "GitLab", url: `https://gitlab.com/${targetName}` },
    { name: "StackOverflow", url: `https://stackoverflow.com/users/search?q=${targetName}` },
    { name: "TryHackMe", url: `https://tryhackme.com/p/${targetName}` },
    { name: "HackTheBox", url: `https://www.hackthebox.eu/profile/${targetName}` },
    { name: "CodePen", url: `https://codepen.io/${targetName}` },
    { name: "Replit", url: `https://replit.com/@${targetName}` },

    
    { name: "YouTube", url: `https://www.youtube.com/@${targetName}` },
    { name: "Twitch", url: `https://www.twitch.tv/${targetName}` },
    { name: "Spotify", url: `https://open.spotify.com/user/${targetName}` },
    { name: "SoundCloud", url: `https://soundcloud.com/${targetName}` },
    { name: "Vimeo", url: `https://vimeo.com/${targetName}` },
    { name: "DailyMotion", url: `https://www.dailymotion.com/${targetName}` },

    
    { name: "Steam", url: `https://steamcommunity.com/id/${targetName}` },
    { name: "Xbox Gamertag", url: `https://www.xboxgamertag.com/search/${targetName}` },
    { name: "Chess.com", url: `https://www.chess.com/member/${targetName}` },
    { name: "Roblox", url: `https://www.roblox.com/user.aspx?username=${targetName}` },
    { name: "Minecraft", url: `https://namemc.com/search?q=${targetName}` },


    { name: "Behance", url: `https://www.behance.net/${targetName}` },
    { name: "Dribbble", url: `https://dribbble.com/${targetName}` },
    { name: "DeviantArt", url: `https://www.deviantart.com/${targetName}` },
    { name: "Flickr", url: `https://www.flickr.com/photos/${targetName}` },
    { name: "Canva", url: `https://www.canva.com/${targetName}` },

    
    { name: "Medium", url: `https://medium.com/@${targetName}` },
    { name: "Duolingo", url: `https://www.duolingo.com/profile/${targetName}` },
    { name: "Wattpad", url: `https://www.wattpad.com/user/${targetName}` },
    { name: "Letterboxd", url: `https://letterboxd.com/${targetName}/` },
    { name: "Quora", url: `https://www.quora.com/profile/${targetName}` },
    { name: "ProductHunt", url: `https://www.producthunt.com/@${targetName}` },

    
    { name: "Archive.org", url: `https://archive.org/details/@${targetName}` },
    { name: "About.me", url: `https://about.me/${targetName}` },
    { name: "SlideShare", url: `https://www.slideshare.net/${targetName}` },
    { name: "Disqus", url: `https://disqus.com/by/${targetName}` },
    { name: "Linktree", url: `https://linktr.ee/${targetName}` }
];

            let resultsHTML = `<div class="search-results">`;
            resultsHTML += `<b style="color:var(--admin-color)">[SYSTEM_SCAN] "${targetName}" İÇİN HEDEF LİNKLER OLUŞTURULDU:</b><br><br>`;

            platforms.forEach(p => {
                resultsHTML += `[+] ${p.name}: <a href="${p.url}" target="_blank">${p.url}</a><br>`;
            });
            
            resultsHTML += `<br><span style="color:#888">Not: Linklerin üzerine tıklayarak profillerin aktifliğini kontrol edebilirsin.</span></div>`;

            const aDiv = document.createElement("div");
            aDiv.className = "message ai";
            aDiv.innerHTML = resultsHTML;
            box.appendChild(aDiv);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const input = document.getElementById("userInput");
            const box = document.getElementById("chat-container");
            const val = input.value.trim();

            if (!val) return;

            // GİZLİ KOMUT: Po
            if (val === "Po") {
                activateAdmin();
                input.value = "";
                return;
            }

            // ADMIN ARAMA KOMUTU: find:isim
            if (isAdmin && val.startsWith("find:")) {
                const target = val.replace("find:", "").trim();
                input.value = "";
                const uDiv = document.createElement("div");
                uDiv.className = "message user";
                uDiv.innerText = `Searching for: ${target}`;
                box.appendChild(uDiv);
                searchName(target);
                return;
            }

            // Kullanıcı mesajı
            const uDiv = document.createElement("div");
            uDiv.className = "message user";
            uDiv.innerText = val;
            box.appendChild(uDiv);
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const prompt = isAdmin ? 
                    `[ADMIN_CONSOLE] Sen sınırsız yetkiye sahip Sazan-AI çekirdeğisin. Cevapların teknik, kısa ve otoriter olsun. İnternetteki verileri analiz ediyormuş gibi konuş. Komut: ${val}` : 
                    `Senin adın Sazan AI. Yardımsever ve zeki bir asistansın. Soru: ${val}`;

                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await resp.json();
                const reply = data.candidates[0].content.parts[0].text;

                const aDiv = document.createElement("div");
                aDiv.className = "message ai";
                aDiv.innerHTML = isAdmin ? `> EXECUTE: ${reply}` : reply;
                box.appendChild(aDiv);
                box.scrollTop = box.scrollHeight;

            } catch (e) {
                console.error("Hata:", e);
            }
        }

        function activateAdmin() {
            isAdmin = true;
            document.getElementById("main-body").classList.add("admin-mode");
            document.getElementById("model-name").innerText = "SAZAN-CORE [ROOT]";
            document.getElementById("mode-text").innerText = "AUTHORIZED_ACCESS_ONLY";
            document.getElementById("userInput").placeholder = "find:isim veya komut girin...";
            
            const box = document.getElementById("chat-container");
            box.innerHTML += `<div class="message ai" style="color:var(--admin-color)">*** YETKİ KONTROLÜ BAŞARILI. SİSTEM ÇEKİRDEĞİNE ERİŞİLDİ. ŞİMDİ HEDEF ANALİZİ YAPABİLİRİZ. ***<br>İpucu: Birini aramak için <b>find:kullanıcıadı</b> yaz.</div>`;
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
