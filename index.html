<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZAN AI | ADMIN PANEL</title>
    <style>
        :root {
            --admin-neon: #ff0055;
            --user-neon: #00f2fe;
            --bg-dark: #020202;
            --glass: rgba(15, 15, 15, 0.85);
        }

        body { 
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace; /* Admin havası için monospaced font */
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* Matrix/Neon Arka Plan Efekti */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* SOL TARAF: Chat Alanı */
        .main-chat { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            position: relative;
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid #1a1a1a;
            border-radius: 15px; 
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            margin-bottom: 20px;
        }

        /* SAĞ TARAF: Admin Paneli */
        .admin-sidebar { 
            width: 380px; 
            background: #050505;
            border-left: 2px solid var(--admin-neon);
            padding: 25px; 
            box-shadow: -10px 0 30px rgba(255, 0, 85, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Neon Butonlar ve Inputlar */
        input { 
            background: #111; 
            border: 1px solid #333; 
            color: var(--user-neon); 
            padding: 15px; 
            border-radius: 5px; 
            outline: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        input:focus { border-color: var(--user-neon); box-shadow: 0 0 10px var(--user-neon); }

        .btn { 
            padding: 15px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-admin { background: var(--admin-neon); color: white; box-shadow: 0 0 15px var(--admin-neon); }
        .btn-admin:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Mesaj Balonları */
        .msg { margin-bottom: 20px; padding: 15px; border-radius: 5px; position: relative; max-width: 85%; }
        .user-msg { 
            background: rgba(0, 242, 254, 0.1); 
            border: 1px solid var(--user-neon); 
            color: var(--user-neon);
            align-self: flex-end; 
            margin-left: auto;
            text-shadow: 0 0 5px var(--user-neon);
        }
        .ai-msg { 
            background: rgba(255, 0, 85, 0.05); 
            border: 1px solid var(--admin-neon);
            color: var(--admin-neon);
            border-left: 5px solid var(--admin-neon);
        }

        /* Admin Rozeti */
        .admin-badge {
            background: var(--admin-neon);
            color: black;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 3px;
            margin-bottom: 5px;
            display: inline-block;
        }

        .locked { filter: grayscale(1) blur(20px); pointer-events: none; }
        
        /* RGB Efekti */
        .rgb-line {
            height: 3px;
            width: 100%;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 400% 400%;
            animation: rgb-move 5s linear infinite;
        }

        @keyframes rgb-move { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
</head>
<body>

    <div id="mainSection" class="main-chat locked">
        <div class="rgb-line" style="position: absolute; top: 0; left: 0;"></div>
        <h1 style="color: var(--user-neon); text-shadow: 0 0 20px var(--user-neon); margin: 10px 0;">> SAZAN_AI_OS_V2.0</h1>
        
        <div id="chat-box">
            <div class="msg ai-msg">Sistem kilitli. Yetkili girişi bekleniyor...</div>
        </div>

        <div style="display: flex; gap: 10px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid var(--user-neon);">
            <span style="color: var(--user-neon); padding-top: 10px;">root@sazan:~$</span>
            <input type="text" id="userInput" style="flex: 1; background: transparent; border: none;" placeholder="Komut girin...">
            <button onclick="askSazan()" class="btn btn-admin" style="padding: 10px 30px;">ENTER</button>
        </div>
    </div>

    <div class="admin-sidebar">
        <h2 style="color: var(--admin-neon); text-align: center; text-shadow: 0 0 10px var(--admin-neon);">ADMIN_LOGIN</h2>
        
        <div id="authTabs">
            <div id="loginForm" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="lName" placeholder="USER_ID">
                <input type="password" id="lPass" placeholder="PASSCODE">
                <button class="btn btn-admin" onclick="handleLogin()">ACCESS_GRANTED</button>
                <hr style="border: 1px solid #222; width: 100%;">
                <button class="btn" style="background: #333; color: white;" onclick="showRegister()">NEW_SYSTEM_USER</button>
            </div>

            <div id="registerForm" style="display: none; flex-direction: column; gap: 15px;">
                <input type="text" id="rName" placeholder="NEW_ID">
                <input type="password" id="rPass" placeholder="NEW_PASS">
                <button class="btn" style="background: var(--user-neon); color: black;" onclick="handleRegister()">CREATE_USER</button>
            </div>
            <p id="statusMsg" style="text-align: center; margin-top: 10px;"></p>
        </div>

        <div id="userInfo" style="display: none; border: 1px solid var(--admin-neon); padding: 15px; border-radius: 10px; background: rgba(255,0,85,0.05);">
            <div class="admin-badge">SYSTEM_ADMIN</div>
            <h3 style="margin: 5px 0;">User: <span id="currentUserName" style="color: var(--admin-neon);"></span></h3>
            <div style="font-size: 12px; color: #666; margin-bottom: 10px;">Status: Online / Encrypted</div>
            <button onclick="location.reload()" class="btn" style="background: transparent; border: 1px solid #444; color: #444; width: 100%;">SYSTEM_SHUTDOWN</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA3n_b0FjBLvarfgap2CWvi-Ql-yTeTtq4"; // Kendi key'ini buraya koy

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'flex';
        }

        window.handleRegister = function() {
            const name = document.getElementById("rName").value;
            const pass = document.getElementById("rPass").value;
            if(!name || !pass) return alert("Hata!");
            localStorage.setItem("sazan_v2_" + name, pass);
            alert("Sistem kullanıcısı oluşturuldu!");
            location.reload();
        }

        window.handleLogin = function() {
            const name = document.getElementById("lName").value;
            const pass = document.getElementById("lPass").value;
            const savedPass = localStorage.getItem("sazan_v2_" + name);

            if(savedPass === pass && name !== "") {
                document.getElementById("mainSection").classList.remove("locked");
                document.getElementById("authTabs").style.display = "none";
                document.getElementById("userInfo").style.display = "block";
                document.getElementById("currentUserName").innerText = name.toUpperCase();
                addMessage("ai", `[SYSTEM_LOG]: Hoş geldin Yönetici ${name}. Çekirdek yapay zeka aktif edildi. İsteklerinizi bekliyorum.`);
            } else {
                document.getElementById("statusMsg").innerText = "ERİŞİM REDDEDİLDİ!";
                document.getElementById("statusMsg").style.color = "var(--admin-neon)";
            }
        }

        function addMessage(type, text) {
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `msg ${type}-msg`;
            div.innerHTML = type === "ai" ? `<div class="admin-badge">SAZAN_AI_CORE</div><br>${text}` : text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        window.askSazan = async function() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            addMessage("user", `> ${text}`);
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Sen Sazan AI sistem çekirdeğisin. Çok teknik, havalı ve zeki bir asistan gibi konuş. Her cevabın başında kısa bir [DATA_PROCESSED] gibi kodlar kullanabilirsin. Soru: " + text }] }]
                    })
                });
                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                addMessage("ai", `[ANALYSIS_COMPLETE]: ${aiReply}`);
            } catch (e) {
                addMessage("ai", "[CRITICAL_ERROR]: API bağlantısı kurulamadı. Lütfen protokolleri kontrol edin.");
            }
        }
    </script>
</body>
</html>
