<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZAN AI | ROOT TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0b0e14;
            --text: #e6edf3;
            --primary: #2f81f7;
            --admin-color: #00ff41;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        body.admin-mode {
            background-color: #000;
            font-family: 'Courier New', monospace;
            --primary: var(--admin-color);
        }

        .header {
            padding: 15px 30px;
            border-bottom: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 14, 20, 0.9);
            z-index: 10;
        }

        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #238636; display: inline-block; margin-right: 5px;
            box-shadow: 0 0 10px #238636;
        }

        #chat-container {
            flex: 1; overflow-y: auto;
            padding: 40px 10% 120px 10%;
            display: flex; flex-direction: column; gap: 20px;
            transition: 0.5s;
        }

        .admin-mode #chat-container { margin-right: 320px; }

        .message { max-width: 85%; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease; padding: 10px; border-radius: 8px; }
        .user { align-self: flex-end; color: #8b949e; border-right: 2px solid var(--primary); }
        .ai { align-self: flex-start; border-left: 2px solid #30363d; background: rgba(255,255,255,0.02); }

        .admin-mode .ai { border-left-color: var(--admin-color); color: var(--admin-color); text-shadow: 0 0 5px rgba(0,255,65,0.5); }

        .input-wrapper {
            position: fixed; bottom: 0; width: 100%;
            padding: 20px 0; background: linear-gradient(transparent, var(--bg) 80%);
            display: flex; justify-content: center;
        }

        .input-container {
            width: 80%; max-width: 900px;
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; display: flex; padding: 8px 15px;
        }

        .admin-mode .input-container { border-color: var(--admin-color); box-shadow: 0 0 15px rgba(0,255,65,0.1); }

        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* IDENTITY CARD & MAP STİLLERİ */
        .id-card {
            border: 1px solid var(--admin-color);
            background: rgba(0, 255, 65, 0.05);
            padding: 15px; border-radius: 8px;
            display: flex; gap: 15px; margin-bottom: 10px;
            animation: fadeIn 0.5s ease;
        }
        .id-avatar { width: 60px; height: 60px; border: 1px solid var(--admin-color); background: #000; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .id-info { font-size: 12px; line-height: 1.4; }
        .id-info b { color: var(--admin-color); text-transform: uppercase; }

        .fake-map {
            width: 100%; height: 180px; background: #001100; margin: 10px 0;
            border: 1px solid var(--admin-color); position: relative; overflow: hidden;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg');
            background-size: cover; opacity: 0.6; border-radius: 8px;
        }
        .map-ping {
            position: absolute; width: 12px; height: 12px; background: #ff0000;
            border-radius: 50%; box-shadow: 0 0 15px #ff0000; animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        #admin-sidebar {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100vh;
            background: rgba(0, 5, 0, 0.95); border-left: 2px solid var(--admin-color);
            transition: 0.5s; padding: 20px; box-sizing: border-box; z-index: 50;
            font-family: monospace; color: var(--admin-color);
        }
        .admin-mode #admin-sidebar { right: 0; }
        .sidebar-title { border-bottom: 1px solid var(--admin-color); padding-bottom: 10px; font-weight: bold; margin-bottom: 15px; }
        .log-box { font-size: 11px; height: 80%; overflow-y: auto; }
        .log-line { margin-bottom: 5px; opacity: 0.8; border-bottom: 1px solid rgba(0,255,65,0.1); }

        .osint-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 6px; margin-top: 15px; border: 1px solid var(--admin-color);
            padding: 10px; background: rgba(0,255,65,0.05); border-radius: 8px;
            max-height: 300px; overflow-y: auto;
        }
        .osint-grid a { 
            color: var(--admin-color); text-decoration: none; font-size: 10px; 
            border: 1px solid rgba(0, 255, 65, 0.3); padding: 4px; 
            border-radius: 4px; text-align: center; background: rgba(0,0,0,0.5);
        }
        .osint-grid a:hover { background: var(--admin-color); color: black; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="main-body">

    <div id="admin-sidebar">
        <div class="sidebar-title">ROOT MONITOR [LOGS]</div>
        <div id="log-box" class="log-box"></div>
    </div>

    <div class="header">
        <div style="font-weight: bold; font-size: 1.2rem;">
            <span class="status-dot"></span> <span id="model-name">SAZAN-AI v2.0</span>
        </div>
        <div id="mode-text" style="font-size: 11px; color: #8b949e; font-family: monospace;">GUEST_SESSION</div>
    </div>

    <div id="chat-container">
        <div class="message ai">Güvenli bağlantı kuruldu. Sazan-AI hazır.</div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Soru sorun veya komut girin..." autocomplete="off">
            <button onclick="send()">GÖNDER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "BURAYA_API_KEY", databaseURL: "https://PROJE-ADIN.firebaseio.com", projectId: "PROJE-ADIN" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GEMINI_API_KEY = "BURAYA_GEMINI_KEY"; 
        let isAdmin = false;

        const accessSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
        const typeSound = new Audio('https://www.soundjay.com/communication/sounds/typewriter-key-1.mp3');

        // --- FULL DEV OSINT LIST (BÜYÜK LİSTE) ---
        const getFullOSINT = (target) => [
            { n: "Instagram", u: `https://www.instagram.com/${target}/` },
            { n: "Twitter", u: `https://twitter.com/${target}` },
            { n: "TikTok", u: `https://www.tiktok.com/@${target}` },
            { n: "Reddit", u: `https://www.reddit.com/user/${target}` },
            { n: "GitHub", u: `https://github.com/${target}` },
            { n: "YouTube", u: `https://www.youtube.com/@${target}` },
            { n: "Twitch", u: `https://www.twitch.tv/${target}` },
            { n: "Pinterest", u: `https://www.pinterest.com/${target}/` },
            { n: "Steam", u: `https://steamcommunity.com/id/${target}` },
            { n: "Spotify", u: `https://open.spotify.com/user/${target}` },
            { n: "Chess.com", u: `https://www.chess.com/member/${target}` },
            { n: "Duolingo", u: `https://www.duolingo.com/profile/${target}` },
            { n: "Roblox", u: `https://www.roblox.com/user.aspx?username=${target}` },
            { n: "Minecraft", u: `https://namemc.com/search?q=${target}` },
            { n: "Medium", u: `https://medium.com/@${target}` },
            { n: "Behance", u: `https://www.behance.net/${target}` },
            { n: "Dribbble", u: `https://dribbble.com/${target}` },
            { n: "DeviantArt", u: `https://www.deviantart.com/${target}` },
            { n: "SoundCloud", u: `https://soundcloud.com/${target}` },
            { n: "Vimeo", u: `https://vimeo.com/${target}` },
            { n: "TryHackMe", u: `https://tryhackme.com/p/${target}` },
            { n: "HackTheBox", u: `https://www.hackthebox.eu/profile/${target}` },
            { n: "CodePen", u: `https://codepen.io/${target}` },
            { n: "Replit", u: `https://replit.com/@${target}` },
            { n: "GitLab", u: `https://gitlab.com/${target}` },
            { n: "Linktree", u: `https://linktr.ee/${target}` },
            { n: "Letterboxd", u: `https://letterboxd.com/${target}/` },
            { n: "Wattpad", u: `https://www.wattpad.com/user/${target}` },
            { n: "Quora", u: `https://www.quora.com/profile/${target}` },
            { n: "Tumblr", u: `https://${target}.tumblr.com` },
            { n: "Flickr", u: `https://www.flickr.com/photos/${target}` },
            { n: "SlideShare", u: `https://www.slideshare.net/${target}` },
            { n: "Disqus", u: `https://disqus.com/by/${target}` },
            { n: "About.me", u: `https://about.me/${target}` },
            { n: "ProductHunt", u: `https://www.producthunt.com/@${target}` },
            { n: "DailyMotion", u: `https://www.dailymotion.com/${target}` },
            { n: "Canva", u: `https://www.canva.com/${target}` },
            { n: "Archive.org", u: `https://archive.org/details/@${target}` },
            { n: "Keybase", u: `https://keybase.io/${target}` },
            { n: "Last.fm", u: `https://www.last.fm/user/${target}` }
        ];

        async function send() {
            const input = document.getElementById("userInput");
            const val = input.value.trim();
            if (!val) return;

            if (val === "Po") {
                activateAdmin();
                input.value = "";
                return;
            }

            if (isAdmin && val.startsWith("find:")) {
                const target = val.replace("find:", "").trim();
                input.value = "";
                addMsg("user", `Scanning for: ${target}`);
                
                const risks = ["LOW", "MEDIUM", "HIGH", "CRITICAL"];
                const locs = ["Istanbul, TR", "Amsterdam, NL", "Unknown Proxy", "Berlin, DE", "London, UK"];
                const randomRisk = risks[Math.floor(Math.random() * risks.length)];
                const randomLoc = locs[Math.floor(Math.random() * locs.length)];

                let html = `<div class="id-card">
                    <div class="id-avatar">👤</div>
                    <div class="id-info">
                        <b>Identity:</b> ${target}<br>
                        <b>Risk Level:</b> <span style="color:${randomRisk === 'CRITICAL' ? 'red' : 'var(--admin-color)'}">${randomRisk}</span><br>
                        <b>Estimated Loc:</b> ${randomLoc}<br>
                        <b>Status:</b> TRACKED
                    </div>
                </div>`;
                
                html += `<div class="fake-map"><div class="map-ping" style="top:${Math.random()*70 + 10}%; left:${Math.random()*70 + 10}%"></div></div>`;
                html += `<div class="osint-grid">`;
                getFullOSINT(target).forEach(p => { html += `<a href="${p.u}" target="_blank">${p.n}</a>`; });
                html += `</div>`;
                
                setTimeout(() => { addMsg("ai", html); }, 1200);
                return;
            }

            addMsg("user", val);
            input.value = "";

            try {
                const prompt = isAdmin ? `[ROOT_MODE] Teknik ve otoriter cevap ver: ${val}` : val;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                const reply = data.candidates[0].content.parts[0].text;
                addMsg("ai", isAdmin ? `> EXECUTE_RESULT: ${reply}` : reply);
            } catch (e) { addMsg("ai", "Sistem Hatası."); }
        }

        function addMsg(type, text) {
            const box = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.innerHTML = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function activateAdmin() {
            isAdmin = true;
            accessSound.play().catch(() => {});
            document.getElementById("main-body").classList.add("admin-mode");
            document.getElementById("model-name").innerText = "SAZAN-OS [ROOT]";
            document.getElementById("mode-text").innerText = "ROOT_ACCESS_GRANTED // PORT: 8080";
            addMsg("ai", "<span style='color:#00ff41;'>*** YETKİ SEVİYESİ YÜKSELTİLDİ. GLOBAL KOMUTLAR AKTİF. ***</span>");
            startLogSim();
        }

        function startLogSim() {
            const logs = ["User connected.", "Searching leaks...", "Packet analyzed.", "IP: 185.12.x.x detected."];
            setInterval(() => {
                if(!isAdmin) return;
                const logBox = document.getElementById("log-box");
                const div = document.createElement("div");
                div.className = "log-line";
                div.innerText = `[${new Date().toLocaleTimeString()}] > ${logs[Math.floor(Math.random() * logs.length)]}`;
                logBox.prepend(div);
                if(logBox.children.length > 20) logBox.lastChild.remove();
            }, 3500);
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => { 
            if(isAdmin) typeSound.play().catch(() => {});
            if (e.key === "Enter") send(); 
        });
    </script>
</body>
</html>
