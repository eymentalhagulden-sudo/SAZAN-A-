<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazan AI</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SOL TARAF: Sohbet Ekranı */
        .main-chat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.5s; }
        #chat-box { width: 100%; max-width: 700px; flex: 1; overflow-y: auto; padding: 20px; border: 1px solid #333; background: #1a1a1a; border-radius: 12px; margin-bottom: 20px; }
        
        /* SAĞ TARAF: Login Paneli */
        .login-sidebar { width: 300px; background: #1e1e1e; border-left: 2px solid #333; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .login-sidebar h2 { color: #007bff; text-align: center; }
        
        /* Form Elemanları */
        input { padding: 12px; border-radius: 8px; border: none; background: #252525; color: white; outline: none; }
        button { padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .logout-btn { background: #dc3545; display: none; }

        /* Mesaj Stilleri */
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 10px; max-width: 80%; }
        .user-msg { background: #007bff; align-self: flex-end; margin-left: auto; }
        .ai-msg { background: #333; border-left: 4px solid #00ff00; }
        
        /* Kilitli Durum */
        .locked { filter: blur(8px); pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="mainSection" class="main-chat locked">
        <h1>🐟 Sazan AI</h1>
        <div id="chat-box">
            <div class="msg ai-msg">Önce sağ taraftan giriş yapmalısın kaptan!</div>
        </div>
        <div style="width: 100%; max-width: 700px; display: flex; gap: 10px;">
            <input type="text" id="userInput" style="flex: 1;" placeholder="Sazan AI'ya sor...">
            <button onclick="askSazan()">Gönder</button>
        </div>
    </div>

    <div class="login-sidebar">
        <h2>Giriş Yap</h2>
        <div id="loginForm">
            <input type="text" id="adminName" placeholder="Kullanıcı Adı">
            <input type="password" id="adminPass" placeholder="Şifre" style="margin-top: 10px; width: 275px;">
            <button onclick="checkLogin()" style="margin-top: 15px; width: 100%;">Sistemi Aç</button>
            <p id="errorMsg" style="color: red; font-size: 12px; text-align: center; display: none;">Hatalı bilgi!</p>
        </div>
        <div id="userInfo" style="display: none; text-align: center;">
            <p>Hoş geldin, <b id="displayUser"></b>!</p>
            <button onclick="logout()" class="logout-btn" id="logoutBtn" style="display: block; width: 100%;">Çıkış Yap</button>
        </div>
    </div>

    <script type="module">
        const API_KEY = "AIzaSyDeWlOKqVUg-lPm-_Cs5x8kxd7I_pVElDw";

        // GİRİŞ KONTROLÜ
        window.checkLogin = function() {
            const name = document.getElementById("adminName").value;
            const pass = document.getElementById("adminPass").value;

            // Örnek bilgiler: admin / 1234
            if(name === "admin" && pass === "1234") {
                document.getElementById("mainSection").classList.remove("locked");
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("userInfo").style.display = "block";
                document.getElementById("displayUser").innerText = name;
                document.getElementById("chat-box").innerHTML += `<div class="msg ai-msg">Sistem açıldı! Sorunu bekliyorum.</div>`;
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        window.logout = function() {
            location.reload(); // Sayfayı yenileyerek çıkış yap
        }

        // CHAT FONKSİYONU
        window.askSazan = async function() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const text = input.value.trim();

            if (!text) return;

            chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Senin adın Sazan AI. Esprili birisin. Soru: ${text}` }] }]
                    })
                });
                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;

                chatBox.innerHTML += `<div class="msg ai-msg"><b>Sazan AI:</b><br>${aiReply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg ai-msg">Bağlantı hatası!</div>`;
            }
        }
    </script>
</body>
</html>
