<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazan AI</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        #chat-box { width: 90%; max-width: 600px; flex: 1; overflow-y: auto; padding: 20px; border: 1px solid #333; margin-top: 20px; background: #1a1a1a; border-radius: 12px; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user-msg { background: #007bff; align-self: flex-end; margin-left: auto; }
        .ai-msg { background: #333; border-left: 4px solid #00ff00; }
        .input-area { width: 90%; max-width: 600px; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #252525; color: white; outline: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>🐟 Sazan AI</h1>

    <div id="chat-box">
        <div class="msg ai-msg">Selam! Ben Sazan AI. sana hizmet veriyorum. Ne sormak istersin?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Bir şeyler yaz...">
        <button onclick="askSazan()">Gönder</button>
    </div>

    <script type="module">
        // Gemini API'yi doğrudan JS içinden çağırıyoruz
        const API_KEY = "AIzaSyDeWlOKqVUg-lPm-_Cs5x8kxd7I_pVElDw"; 

        window.askSazan = async function() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const userText = input.value.trim();

            if (!userText) return;

            // Kullanıcı mesajını ekrana yaz
            chatBox.innerHTML += `<div class="msg user-msg">${userText}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Senin adın Sazan AI. Esprili birisin. Soru: ${userText}` }] }]
                    })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;

                // AI mesajını ekrana yaz
                chatBox.innerHTML += `<div class="msg ai-msg"><b>Sazan AI:</b><br>${aiReply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                chatBox.innerHTML += `<div class="msg ai-msg" style="color:red;">Hata: API anahtarını kontrol et veya tekrar dene!</div>`;
            }
        }
    </script>
</body>
</html>
