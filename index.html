<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZAN AI | ROOT TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0b0e14;
            --text: #e6edf3;
            --primary: #2f81f7;
            --admin-color: #00ff41;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        body.admin-mode {
            background-color: #000;
            font-family: 'Courier New', monospace;
            --primary: var(--admin-color);
        }

        /* MATRIX CANVAS */
        #matrix-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; display: none;
        }
        .admin-mode #matrix-canvas { display: block; }

        /* VPN PANEL */
        #vpn-panel {
            position: fixed; top: 70px; left: 20px;
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid var(--admin-color);
            padding: 10px; border-radius: 8px;
            display: none; z-index: 100;
            font-size: 11px; color: var(--admin-color);
            box-shadow: 0 0 15px rgba(0,255,65,0.2);
        }
        .admin-mode #vpn-panel { display: block; }
        .vpn-btn {
            background: transparent; border: 1px solid var(--admin-color);
            color: var(--admin-color); padding: 5px 10px; cursor: pointer;
            margin-top: 5px; font-size: 10px; width: 100%;
        }
        .vpn-btn:hover { background: var(--admin-color); color: black; }

        .header {
            padding: 15px 30px; border-bottom: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 14, 20, 0.9); z-index: 10;
        }

        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #238636; display: inline-block; margin-right: 5px;
            box-shadow: 0 0 10px #238636;
        }

        #chat-container {
            flex: 1; overflow-y: auto;
            padding: 40px 10% 120px 10%;
            display: flex; flex-direction: column; gap: 20px;
            transition: 0.5s; position: relative;
        }

        .admin-mode #chat-container { margin-right: 320px; }

        .message { max-width: 85%; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease; padding: 10px; border-radius: 8px; }
        .user { align-self: flex-end; color: #8b949e; border-right: 2px solid var(--primary); }
        .ai { align-self: flex-start; border-left: 2px solid #30363d; background: rgba(255,255,255,0.02); }
        .admin-mode .ai { border-left-color: var(--admin-color); color: var(--admin-color); text-shadow: 0 0 5px rgba(0,255,65,0.5); }

        /* OSINT & ID CARD */
        .id-card {
            border: 1px solid var(--admin-color); background: rgba(0, 255, 65, 0.1);
            padding: 15px; border-radius: 8px; display: flex; gap: 15px; margin-bottom: 10px;
        }
        .id-avatar { width: 60px; height: 60px; border: 1px solid var(--admin-color); background: #000; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .id-info { font-size: 12px; line-height: 1.4; }
        .id-info b { color: var(--admin-color); }

        .fake-map {
            width: 100%; height: 180px; background: #001100; margin: 10px 0;
            border: 1px solid var(--admin-color); position: relative; overflow: hidden;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg');
            background-size: cover; opacity: 0.6; border-radius: 8px;
        }
        .map-ping { position: absolute; width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 15px #ff0000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .osint-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 6px; margin-top: 15px; border: 1px solid var(--admin-color);
            padding: 10px; background: rgba(0,255,65,0.05); border-radius: 8px; max-height: 300px; overflow-y: auto;
        }
        .osint-grid a { color: var(--admin-color); text-decoration: none; font-size: 9px; border: 1px solid rgba(0, 255, 65, 0.3); padding: 4px; border-radius: 4px; text-align: center; background: rgba(0,0,0,0.5); }
        .osint-grid a:hover { background: var(--admin-color); color: black; }

        .input-wrapper { position: fixed; bottom: 0; width: 100%; padding: 20px 0; background: linear-gradient(transparent, var(--bg) 80%); display: flex; justify-content: center; }
        .input-container { width: 80%; max-width: 900px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: flex; padding: 8px 15px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #admin-sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: rgba(0, 5, 0, 0.95); border-left: 2px solid var(--admin-color); transition: 0.5s; padding: 20px; box-sizing: border-box; z-index: 50; color: var(--admin-color); font-size: 12px; }
        .admin-mode #admin-sidebar { right: 0; }
        .log-box { font-size: 10px; height: 85%; overflow-y: auto; border-top: 1px solid var(--admin-color); padding-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="main-body">

    <canvas id="matrix-canvas"></canvas>

    <div id="vpn-panel">
        <div><b>VPN STATUS:</b> <span id="vpn-stat" style="color:red">OFFLINE</span></div>
        <button class="vpn-btn" onclick="toggleVPN()">ESTABLISH TUNNEL</button>
    </div>

    <div id="admin-sidebar">
        <div style="font-weight: bold; margin-bottom: 10px;">SYSTEM LOGS</div>
        <div id="log-box" class="log-box"></div>
    </div>

    <div class="header">
        <div style="font-weight: bold; font-size: 1.2rem;">
            <span class="status-dot"></span> <span id="model-name">SAZAN-AI v2.0</span>
        </div>
        <div id="mode-text" style="font-size: 11px; color: #8b949e; font-family: monospace;">GUEST_SESSION</div>
    </div>

    <div id="chat-container">
        <div class="message ai">Güvenli bağlantı kuruldu. Sazan-AI hazır.</div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Soru sorun veya komut girin..." autocomplete="off">
            <button onclick="send()">GÖNDER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "BURAYA_API_KEY", databaseURL: "https://PROJE-ADIN.firebaseio.com", projectId: "PROJE-ADIN" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GEMINI_API_KEY = "BURAYA_GEMINI_KEY"; 
        let isAdmin = false;

        const accessSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
        const typeSound = new Audio('https://www.soundjay.com/communication/sounds/typewriter-key-1.mp3');

        function toggleVPN() {
            const stat = document.getElementById("vpn-stat");
            stat.innerText = "CONNECTING..."; stat.style.color = "yellow";
            setTimeout(() => {
                stat.innerText = "ENCRYPTED"; stat.style.color = "#00ff41";
                addMsg("ai", "> VPN: Connection established via Moscow, RU. AES-256-GCM Active.");
            }, 1500);
        }

        // --- DEV OSINT LISTESİ (40 SİTE) ---
        const getFullOSINT = (target) => [
            { n: "Instagram", u: `https://www.instagram.com/${target}/` },
            { n: "Twitter", u: `https://twitter.com/${target}` },
            { n: "TikTok", u: `https://www.tiktok.com/@${target}` },
            { n: "Reddit", u: `https://www.reddit.com/user/${target}` },
            { n: "GitHub", u: `https://github.com/${target}` },
            { n: "YouTube", u: `https://www.youtube.com/@${target}` },
            { n: "Twitch", u: `https://www.twitch.tv/${target}` },
            { n: "Pinterest", u: `https://www.pinterest.com/${target}/` },
            { n: "Steam", u: `https://steamcommunity.com/id/${target}` },
            { n: "Spotify", u: `https://open.spotify.com/user/${target}` },
            { n: "Chess.com", u: `https://www.chess.com/member/${target}` },
            { n: "Duolingo", u: `https://www.duolingo.com/profile/${target}` },
            { n: "Roblox", u: `https://www.roblox.com/user.aspx?username=${target}` },
            { n: "Minecraft", u: `https://namemc.com/search?q=${target}` },
            { n: "Medium", u: `https://medium.com/@${target}` },
            { n: "Behance", u: `https://www.behance.net/${target}` },
            { n: "Dribbble", u: `https://dribbble.com/${target}` },
            { n: "DeviantArt", u: `https://www.deviantart.com/${target}` },
            { n: "SoundCloud", u: `https://soundcloud.com/${target}` },
            { n: "Vimeo", u: `https://vimeo.com/${target}` },
            { n: "TryHackMe", u: `https://tryhackme.com/p/${target}` },
            { n: "HackTheBox", u: `https://www.hackthebox.eu/profile/${target}` },
            { n: "CodePen", u: `https://codepen.io/${target}` },
            { n: "Replit", u: `https://replit.com/@${target}` },
            { n: "GitLab", u: `https://gitlab.com/${target}` },
            { n: "Linktree", u: `https://linktr.ee/${target}` },
            { n: "Letterboxd", u: `https://letterboxd.com/${target}/` },
            { n: "Wattpad", u: `https://www.wattpad.com/user/${target}` },
            { n: "Quora", u: `https://www.quora.com/profile/${target}` },
            { n: "Tumblr", u: `https://${target}.tumblr.com` },
            { n: "Flickr", u: `https://www.flickr.com/photos/${target}` },
            { n: "SlideShare", u: `https://www.slideshare.net/${target}` },
            { n: "Disqus", u: `https://disqus.com/by/${target}` },
            { n: "About.me", u: `https://about.me/${target}` },
            { n: "ProductHunt", u: `https://www.producthunt.com/@${target}` },
            { n: "DailyMotion", u: `https://www.dailymotion.com/${target}` },
            { n: "Canva", u: `https://www.canva.com/${target}` },
            { n: "Archive.org", u: `https://archive.org/details/@${target}` },
            { n: "Keybase", u: `https://keybase.io/${target}` },
            { n: "Last.fm", u: `https://www.last.fm/user/${target}` }
        ];

        async function send() {
            const input = document.getElementById("userInput");
            const val = input.value.trim();
            if (!val) return;

            if (val === "Po") { activateAdmin(); input.value = ""; return; }

            if (isAdmin && val.startsWith("find:")) {
                const target = val.replace("find:", "").trim();
                input.value = "";
                addMsg("user", `Initiating Deep Scan: ${target}`);
                
                let html = `<div class="id-card"><div class="id-avatar">👤</div><div class="id-info"><b>Identity:</b> ${target}<br><b>Risk:</b> HIGH<br><b>Status:</b> TRACKED</div></div>`;
                html += `<div class="fake-map"><div class="map-ping" style="top:${Math.random()*70+10}%; left:${Math.random()*70+10}%"></div></div>`;
                html += `<div class="osint-grid">`;
                getFullOSINT(target).forEach(p => { html += `<a href="${p.u}" target="_blank">${p.n}</a>`; });
                html += `</div>`;
                
                setTimeout(() => { addMsg("ai", html); }, 1200);
                return;
            }

            addMsg("user", val); input.value = "";
            try {
                const prompt = isAdmin ? `[ROOT] Teknik konuş: ${val}` : val;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                addMsg("ai", isAdmin ? `> EXEC: ${data.candidates[0].content.parts[0].text}` : data.candidates[0].content.parts[0].text);
            } catch (e) { addMsg("ai", "Sistem hatası."); }
        }

        function addMsg(type, text) {
            const box = document.getElementById("chat-container");
            const div = document.createElement("div"); div.className = `message ${type}`; div.innerHTML = text;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function activateAdmin() {
            isAdmin = true; accessSound.play().catch(() => {});
            document.getElementById("main-body").classList.add("admin-mode");
            document.getElementById("model-name").innerText = "SAZAN-OS [ROOT]";
            startMatrix(); startLogSim();
        }

        function startMatrix() {
            const canvas = document.getElementById('matrix-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const letters = "0123456789ABCDEF"; const fontSize = 16;
            const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);
            function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, y*fontSize);
                    if (y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
                });
            }
            setInterval(draw, 33);
        }

        function startLogSim() {
            setInterval(() => {
                if(!isAdmin) return;
                const logBox = document.getElementById("log-box");
                const div = document.createElement("div");
                div.style = "margin-bottom:3px; opacity:0.6";
                div.innerText = `[${new Date().toLocaleTimeString()}] > 0x${Math.floor(Math.random()*10000).toString(16).toUpperCase()} SYNC`;
                logBox.prepend(div);
                if(logBox.children.length > 30) logBox.lastChild.remove();
            }, 2500);
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => { 
            if(isAdmin) typeSound.play().catch(() => {});
            if (e.key === "Enter") send(); 
        });
    </script>
</body>
</html>
